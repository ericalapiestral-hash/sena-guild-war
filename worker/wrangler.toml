name = "sena-guild-search"
main = "worker.js"
compatibility_date = "2024-11-01"

# (AI 검색 기능 제거됨 — 관련 vars/secrets 불필요. ANTHROPIC_API_KEY·GUILD_PASSWORD 시크릿은
#  더 이상 안 쓰이니 원하면 `npx wrangler secret delete ANTHROPIC_API_KEY` 로 지워도 됨.
#  Anthropic API 키도 콘솔에서 폐기 가능.)

# 공유 데이터(카운터덱·영웅·가이드·통계) 저장용 KV. 아래 명령으로 만들고 출력된 id를 넣으세요:
#   npx wrangler kv namespace create GUILD_KV
[[kv_namespaces]]
binding = "GUILD_KV"
