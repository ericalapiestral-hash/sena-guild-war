name = "sena-guild-search"
main = "worker.js"
compatibility_date = "2024-11-01"

# 모델 선택 (비용에 직접 영향):
#   claude-haiku-4-5   → 가장 저렴 (기본값), 간단한 공략 Q&A에 충분
#   claude-opus-4-8    → 더 깊고 정확하지만 몇 배 비쌈
# 바꾸려면 아래 값을 수정하고 `npx wrangler deploy` 로 재배포.
[vars]
CLAUDE_MODEL = "claude-haiku-4-5"
# AI 검색 하루 사용 한도 (운영진 전체 합산). 넘으면 429로 막힘.
AI_DAILY_LIMIT = "5"
# AI 검색 1건당 웹검색 횟수 (많을수록 정확·비쌈). 비용의 주 요인.
AI_WEB_SEARCH_USES = "3"

# 시크릿(키·비밀번호)은 여기 적지 말고 CLI로 설정하세요:
#   npx wrangler secret put ANTHROPIC_API_KEY
#   npx wrangler secret put GUILD_PASSWORD

# 공유 데이터(카운터덱·영웅·가이드) 저장용 KV. 아래 명령으로 만들고 출력된 id를 넣으세요:
#   npx wrangler kv namespace create GUILD_KV
[[kv_namespaces]]
binding = "GUILD_KV"
id = "a31934f6fd8d46d7bc45039f1d1b8d93"
